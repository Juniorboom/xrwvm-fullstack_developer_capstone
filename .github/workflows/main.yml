name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Print working directory
        run: pwd

      - name: Run Linter
        run: |
          pwd
          find ./server -name "*.py" \
            -not -path "*/migrations/*" \
            -exec flake8 --ignore=E501,E303,W292,F401,W503 {} +
          echo "Linted all the Python files successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'

      - name: Install JSHint
        run: npm install jshint --global

      - name: Create JSHint Configuration
        run: |
          echo '{"esversion": 8, "sub": true}' > .jshintrc

      - name: Run Linter
        run: |
          find ./server/database -name "*.js" -exec jshint --config .jshintrc {} +
          echo "Linted all the JavaScript files successfully"
